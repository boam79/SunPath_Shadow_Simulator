# 프로덕션 백엔드는 Render(https://sunpath-shadow-simulator.onrender.com)를 사용합니다.
# 이 워크플로는 과거 AWS EC2 복구·특수 유지보수 시에만 수동 실행하세요.
# master 브랜치 push마다 실행되면 EC2가 내려가 있을 때 매번 실패합니다.

name: Deploy Backend to AWS (manual, legacy EC2)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python3 << 'PYEOF'
          import os
          import sys
          key = os.environ.get("SSH_KEY", "")
          if not key:
              print("Error: SSH_KEY environment variable is empty", file=sys.stderr)
              sys.exit(1)
          key = key.replace("\r\n", "\n").replace("\r", "\n")
          key = key.strip()
          if not key.endswith("\n"):
              key += "\n"
          key_path = os.path.expanduser("~/.ssh/id_aws")
          with open(key_path, "w", encoding="utf-8") as f:
              f.write(key)
          os.chmod(key_path, 0o600)
          print(f"SSH key written successfully. Length: {len(key)} chars")
          PYEOF
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Add SSH key to agent
        run: |
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_aws

      - name: Deploy to EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} <<'EOF'
            set -e
            cd /opt/sunpath/app
            git pull
            source backend/.venv/bin/activate
            pip install -r backend/requirements.txt
            deactivate
            sudo systemctl restart sunpath-backend
            sleep 5
            curl -f http://localhost:8000/health
          EOF
